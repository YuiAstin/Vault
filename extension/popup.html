<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 500;
    }
    .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: auto;
    }
    .status.locked { background: #e94560; color: white; }
    .status.unlocked { background: #4ecdc4; color: #111; }
    .status.pairing { background: #f5a623; color: #111; }
    .entries { display: flex; flex-direction: column; gap: 6px; }
    .entry-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .entry-item:hover { background: #0f3460; }
    .entry-icon {
      width: 28px;
      height: 28px;
      background: #e94560;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-info .name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-info .username {
      font-size: 11px;
      color: #a0a0b0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      text-align: center;
      color: #a0a0b0;
      font-size: 13px;
      padding: 20px 0;
    }
    .error {
      color: #e94560;
      font-size: 12px;
      text-align: center;
      padding: 10px 0;
    }
    .pairing-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px 0;
    }
    .pairing-section.active { display: flex; }
    .pairing-section .icon {
      font-size: 32px;
    }
    .pairing-section p {
      font-size: 12px;
      color: #a0a0b0;
      text-align: center;
      line-height: 1.4;
    }
    .pairing-section input {
      width: 140px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 10px;
      color: #eaeaea;
      font-size: 18px;
      font-family: monospace;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
    }
    .pairing-section input:focus { border-color: #f5a623; }
    .pairing-section button {
      width: 140px;
      background: #f5a623;
      border: none;
      border-radius: 6px;
      padding: 8px;
      color: #111;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .pairing-section button:hover { background: #fbbf24; }
    .pairing-section .pair-error {
      color: #e94560;
      font-size: 11px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Vault</h1>
    <span id="status" class="status locked">Connecting...</span>
  </div>
  <div id="pairing-section" class="pairing-section">
    <div class="icon">&#x1F512;</div>
    <p>Too many requests detected.<br>Enter the pairing code shown in Vault:</p>
    <input type="text" id="pair-code-input" maxlength="6" placeholder="000000" />
    <button id="pair-btn">Pair</button>
    <span id="pair-error" class="pair-error"></span>
  </div>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
