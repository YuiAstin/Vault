<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Unlock / Create Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <h1>Vault</h1>
        </div>
        <p id="auth-subtitle" class="subtitle">Enter master password</p>
        <form id="auth-form">
          <input type="password" id="master-password" placeholder="Master password" autocomplete="off" autofocus />
          <div id="pw-strength-bar" class="pw-strength-bar" style="display:none">
            <div id="pw-strength-fill" class="pw-strength-fill"></div>
          </div>
          <p id="pw-strength-label" class="pw-strength-label" style="display:none"></p>
          <input type="password" id="confirm-password" placeholder="Confirm password" autocomplete="off" style="display:none" />
          <button type="submit" id="auth-btn">Unlock</button>
        </form>
        <p id="auth-error" class="error"></p>
      </div>
    </div>

    <!-- Main Vault Screen -->
    <div id="vault-screen" class="screen">
      <header>
        <h2>Vault</h2>
        <div class="header-actions">
          <button id="export-btn" class="btn-icon" title="Export vault backup">&#x2B07;</button>
          <button id="import-btn" class="btn-icon" title="Import vault backup">&#x2B06;</button>
          <button id="import-csv-btn" class="btn-icon" title="Import from CSV">CSV</button>
          <button id="copy-token-btn" class="btn-icon" title="Copy API token for browser extension">&#x1F511;</button>
          <button id="add-btn" class="btn-icon" title="Add entry">+</button>
          <button id="theme-btn" class="btn-icon" title="Theme settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </button>
          <button id="lock-btn" class="btn-icon" title="Lock vault">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="search-bar">
        <input type="text" id="search-input" placeholder="Search entries..." />
        <select id="category-filter" title="Filter by category">
          <option value="">All Categories</option>
        </select>
        <select id="sort-select" title="Sort entries">
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>
      </div>

      <div id="entry-list"></div>

      <div id="settings-bar">
        <label class="toggle-label">
          <input type="checkbox" id="start-on-boot-toggle" />
          <span>Start on boot</span>
        </label>
        <div class="sync-section">
          <div class="sync-row">
            <button id="sync-folder-btn" class="btn-small">Set Sync Folder</button>
            <span id="sync-folder-path" class="sync-path">Not configured</span>
          </div>
          <div class="sync-row">
            <button id="sync-push-btn" class="btn-small">Push</button>
            <button id="sync-pull-btn" class="btn-small">Pull</button>
          </div>
        </div>
      </div>

      <!-- Entry Detail Panel -->
      <div id="detail-panel" class="panel hidden">
        <div class="panel-header">
          <h3 id="detail-name"></h3>
          <button id="close-detail" class="btn-icon">x</button>
        </div>
        <div class="field">
          <label>Username</label>
          <div class="field-value">
            <span id="detail-username"></span>
            <button class="copy-btn" data-copy="username">Copy</button>
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-value">
            <span id="detail-password" class="password-masked"></span>
            <button id="toggle-pw" class="copy-btn">Show</button>
            <button class="copy-btn" data-copy="password">Copy</button>
          </div>
        </div>
        <div class="field" id="detail-url-field">
          <label>URL</label>
          <div class="field-value">
            <span id="detail-url"></span>
          </div>
        </div>
        <div class="field" id="detail-category-field">
          <label>Category</label>
          <div class="field-value">
            <span id="detail-category"></span>
          </div>
        </div>
        <div class="field" id="detail-notes-field">
          <label>Notes</label>
          <div class="field-value">
            <span id="detail-notes"></span>
          </div>
        </div>
        <div class="field" id="detail-totp-field" style="display:none;">
          <label>2FA Code</label>
          <div class="field-value">
            <span id="detail-totp-code" style="font-family:monospace;font-size:20px;letter-spacing:3px;font-weight:600;"></span>
            <span id="detail-totp-timer" style="font-size:12px;color:var(--text-dim);min-width:30px;text-align:right;"></span>
            <button class="copy-btn" id="copy-totp-btn">Copy</button>
          </div>
          <div id="totp-progress-bar" style="height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;">
            <div id="totp-progress-fill" style="height:100%;background:var(--accent);transition:width 1s linear;"></div>
          </div>
        </div>
        <div class="panel-actions">
          <button id="autotype-btn" class="btn-secondary">Auto-type</button>
          <button id="check-breach-btn" class="btn-secondary">Check Breach</button>
          <button id="edit-entry-btn" class="btn-primary">Edit</button>
          <button id="delete-entry-btn" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <!-- Add Entry Screen -->
    <div id="add-screen" class="screen">
      <header>
        <button id="back-btn" class="btn-icon">&larr;</button>
        <h2>Add Entry</h2>
      </header>
      <form id="add-form">
        <div class="form-field">
          <label for="entry-name">Name</label>
          <input type="text" id="entry-name" placeholder="e.g. GitHub, Steam" required />
        </div>
        <div class="form-field">
          <label for="entry-username">Username / Email</label>
          <input type="text" id="entry-username" placeholder="user@example.com" />
        </div>
        <div class="form-field">
          <label for="entry-password">Password</label>
          <div class="password-input-group">
            <input type="password" id="entry-password" placeholder="Enter or generate" />
            <button type="button" id="gen-pw-btn" title="Generate password">Gen</button>
          </div>
        </div>
        <div class="form-field">
          <label for="entry-url">URL (optional)</label>
          <input type="text" id="entry-url" placeholder="https://..." />
        </div>
        <div class="form-field">
          <label for="entry-category">Category (optional)</label>
          <div class="category-input-group">
            <input type="text" id="entry-category" list="category-suggestions" placeholder="e.g. Social, Work, Finance" />
            <datalist id="category-suggestions"></datalist>
          </div>
        </div>
        <div class="form-field">
          <label for="entry-notes">Notes (optional)</label>
          <textarea id="entry-notes" rows="3" placeholder="Additional notes..."></textarea>
        </div>
        <div class="form-field">
          <label for="entry-totp">TOTP Secret (optional)</label>
          <input type="text" id="entry-totp" placeholder="Base32 secret or otpauth:// URI" />
        </div>
        <button type="submit" class="btn-primary">Save Entry</button>
      </form>
    </div>

    <!-- Edit Entry Screen -->
    <div id="edit-screen" class="screen">
      <header>
        <button id="edit-back-btn" class="btn-icon">&larr;</button>
        <h2>Edit Entry</h2>
      </header>
      <form id="edit-form">
        <input type="hidden" id="edit-entry-id" />
        <div class="form-field">
          <label for="edit-entry-name">Name</label>
          <input type="text" id="edit-entry-name" placeholder="e.g. GitHub, Steam" required />
        </div>
        <div class="form-field">
          <label for="edit-entry-username">Username / Email</label>
          <input type="text" id="edit-entry-username" placeholder="user@example.com" />
        </div>
        <div class="form-field">
          <label for="edit-entry-password">Password</label>
          <div class="password-input-group">
            <input type="password" id="edit-entry-password" placeholder="Leave blank to keep current" />
            <button type="button" id="edit-gen-pw-btn" title="Generate password">Gen</button>
          </div>
        </div>
        <div class="form-field">
          <label for="edit-entry-url">URL (optional)</label>
          <input type="text" id="edit-entry-url" placeholder="https://..." />
        </div>
        <div class="form-field">
          <label for="edit-entry-category">Category (optional)</label>
          <div class="category-input-group">
            <input type="text" id="edit-entry-category" list="edit-category-suggestions" placeholder="e.g. Social, Work, Finance" />
            <datalist id="edit-category-suggestions"></datalist>
          </div>
        </div>
        <div class="form-field">
          <label for="edit-entry-notes">Notes (optional)</label>
          <textarea id="edit-entry-notes" rows="3" placeholder="Additional notes..."></textarea>
        </div>
        <div class="form-field">
          <label for="edit-entry-totp">TOTP Secret (optional)</label>
          <input type="text" id="edit-entry-totp" placeholder="Base32 secret or otpauth:// URI" />
        </div>
        <button type="submit" class="btn-primary">Save Changes</button>
      </form>
    </div>

    <!-- Theme Settings Screen -->
    <div id="theme-screen" class="screen">
      <header>
        <button id="theme-back-btn" class="btn-icon">&larr;</button>
        <h2>Theme</h2>
      </header>

      <div class="theme-content">
        <!-- Preset Grid -->
        <section class="theme-section">
          <h3 class="theme-section-title">Presets</h3>
          <div id="theme-presets" class="theme-grid"></div>
        </section>

        <!-- Custom Colors -->
        <section class="theme-section">
          <h3 class="theme-section-title">Custom Colors</h3>
          <div id="theme-custom" class="theme-custom-grid">
            <div class="color-field">
              <label for="color-bg">Background</label>
              <input type="color" id="color-bg" data-var="bg" />
            </div>
            <div class="color-field">
              <label for="color-bgCard">Cards</label>
              <input type="color" id="color-bgCard" data-var="bgCard" />
            </div>
            <div class="color-field">
              <label for="color-bgInput">Inputs</label>
              <input type="color" id="color-bgInput" data-var="bgInput" />
            </div>
            <div class="color-field">
              <label for="color-accent">Accent</label>
              <input type="color" id="color-accent" data-var="accent" />
            </div>
            <div class="color-field">
              <label for="color-accentHover">Accent Hover</label>
              <input type="color" id="color-accentHover" data-var="accentHover" />
            </div>
            <div class="color-field">
              <label for="color-text">Text</label>
              <input type="color" id="color-text" data-var="text" />
            </div>
            <div class="color-field">
              <label for="color-textDim">Text Dim</label>
              <input type="color" id="color-textDim" data-var="textDim" />
            </div>
            <div class="color-field">
              <label for="color-border">Borders</label>
              <input type="color" id="color-border" data-var="border" />
            </div>
            <div class="color-field">
              <label for="color-success">Success</label>
              <input type="color" id="color-success" data-var="success" />
            </div>
            <div class="color-field">
              <label for="color-danger">Danger</label>
              <input type="color" id="color-danger" data-var="danger" />
            </div>
          </div>
        </section>

        <!-- Actions -->
        <div class="theme-actions">
          <button id="theme-reset-btn" class="btn-secondary">Reset to Default</button>
          <button id="theme-save-btn" class="btn-primary">Save Theme</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
